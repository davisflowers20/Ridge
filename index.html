<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e9eef1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ridge">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Ridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1e2c35;
    --ink-soft:#43525c;
    --paper:#e9eef1;
    --paper-2:#dfe6ea;
    --valley:#e9eef1;
    --valley-2:#dfe6ea;
    --surface:#ffffff;
    --surface-2:#eef3f6;
    --line:#d8e0e5;
    --line-2:#c4cfd6;
    --ridge-1:#b7c5cf;
    --ridge-2:#93a6b2;
    --ridge-3:#aebcc5;
    --haze:#43525c;
    --mist:#1e2c35;
    --muted:#677781;
    --gold:#c25b3c;
    --gold-2:#d06a4a;
    --pine:#3f6f57;
    --radius:14px;
    --maxw:520px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{overscroll-behavior:none}
  html,body{margin:0;padding:0}
  body{
    background:
      repeat top left / 460px 460px url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='460' height='460' viewBox='0 0 460 460'><g fill='none' stroke='%231e2c35' stroke-opacity='.05' stroke-width='1.1'><path d='M-20,80 C60,30 140,120 230,70 C320,20 400,110 480,60'/><path d='M-20,140 C70,95 150,175 230,130 C310,85 390,165 480,120'/><path d='M-20,200 C60,160 150,235 240,190 C330,145 400,225 480,180'/><path d='M-20,265 C70,220 140,300 230,255 C320,210 400,290 480,245'/><path d='M-20,330 C60,285 150,360 240,315 C330,270 400,350 480,305'/><path d='M-20,395 C70,350 140,430 230,385 C320,340 400,420 480,375'/><ellipse cx='120' cy='330' rx='46' ry='24' transform='rotate(-18 120 330)'/><ellipse cx='120' cy='330' rx='24' ry='11' transform='rotate(-18 120 330)'/><ellipse cx='356' cy='96' rx='40' ry='20' transform='rotate(-22 356 96)'/><ellipse cx='356' cy='96' rx='20' ry='9' transform='rotate(-22 356 96)'/></g></svg>"),
      linear-gradient(180deg,#edf1f4 0%, #dfe6ea 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
  }
  /* faint topographic texture */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.055;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='160' viewBox='0 0 220 160'><g fill='none' stroke='%2323241f' stroke-width='1'><path d='M-10,120 C40,90 80,150 130,110 C170,80 200,130 240,100'/><path d='M-10,95 C40,65 80,125 130,85 C170,55 200,105 240,75'/><path d='M-10,70 C40,40 80,100 130,60 C170,30 200,80 240,50'/><path d='M-10,45 C40,15 80,75 130,35 C170,5 200,55 240,25'/></g></svg>");
  }
  .app{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom)) 16px;}

  /* ---- header ---- */
  header{position:sticky;top:0;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(14px + env(safe-area-inset-top)) 2px 12px;background:linear-gradient(180deg,rgba(244,243,238,.94) 78%,rgba(244,243,238,0));backdrop-filter:blur(7px)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand svg{display:block}
  .brand .word{font-family:'Space Grotesk';font-weight:600;font-size:25px;letter-spacing:.12em;text-transform:uppercase;line-height:1}
  .brand .sub{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .weekpick{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 6px}
  .weekpick button{all:unset;cursor:pointer;width:32px;height:32px;display:grid;place-items:center;border-radius:50%;color:var(--haze);font-size:17px}
  .weekpick button:hover{background:var(--surface-2);color:var(--mist)}
  .weekpick .wk{font-family:'Space Mono';font-size:12px;letter-spacing:.02em;color:var(--mist);min-width:96px;text-align:center}
  .weekpick .wk small{display:block;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}

  /* ---- tabs content ---- */
  .view{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:'Space Grotesk';text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--haze);margin:6px 2px 12px;display:flex;align-items:center;gap:8px}
  .eyebrow::after{content:"";flex:1;height:14px;opacity:.4;background:repeat-x center / auto 14px url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='14' viewBox='0 0 120 14'><g fill='none' stroke='%2323241f' stroke-width='1'><path d='M0,7 C20,2 40,12 60,7 C80,2 100,12 120,7'/><path d='M0,11 C24,7 44,14 64,11 C84,8 104,14 120,11'/></g></svg>")}

  /* ---- day cards ---- */
  .day{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .day.today{border-color:var(--ink);box-shadow:0 0 0 1px rgba(35,36,31,.12)}
  .day-head{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;user-select:none}
  .day-name{font-family:'Space Grotesk';font-weight:600;font-size:16px;letter-spacing:.12em;text-transform:uppercase}
  .day-date{font-family:'Space Mono';font-size:11px;color:var(--muted)}
  .today-tag{font-family:'Space Grotesk';font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--surface);background:var(--ink);padding:2px 7px;border-radius:999px;font-weight:600}
  .day-meta{margin-left:auto;display:flex;align-items:center;gap:10px}
  .day-count{font-family:'Space Mono';font-size:11px;color:var(--haze)}
  .chev{color:var(--muted);transition:transform .2s;font-size:13px}
  .day.open .chev{transform:rotate(90deg)}
  .day-body{display:none;padding:0 15px 13px}
  .day.open .day-body{display:block}

  .act{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line)}
  .check{flex:none;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--ridge-3);background:transparent;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .check svg{opacity:0;transform:scale(.6);transition:.15s;color:var(--valley)}
  .check.done{background:var(--ink);border-color:var(--ink)}
  .check.done svg{opacity:1;transform:scale(1)}
  .act-main{flex:1;min-width:0;cursor:pointer}
  .act-type{font-family:'Space Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
  .act-type .dot{width:7px;height:7px;border-radius:50%}
  .act-detail{font-family:'Space Mono';font-size:13px;color:var(--mist);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .act.is-done .act-detail{color:var(--muted)}
  .act-del{all:unset;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;width:36px;height:36px;display:grid;place-items:center;margin-right:-6px}
  .act-del:hover{color:#e88}

  .add-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;padding:10px;background:transparent;border:1px dashed var(--line);border-radius:11px;color:var(--haze);font-family:'Space Grotesk';font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.15s}
  .add-btn:hover{border-color:var(--haze);color:var(--mist);background:rgba(109,151,184,.06)}
  .empty{font-size:13px;color:var(--muted);padding:4px 0 2px;border-top:1px solid var(--line);font-style:italic}

  /* ---- quests / ascent ---- */
  .ascent{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:0;overflow:hidden;margin-bottom:16px;position:relative}
  .ascent svg{display:block;width:100%;height:auto}
  .ascent-cap{display:flex;justify-content:space-between;align-items:baseline;padding:12px 15px 4px}
  .ascent-cap .t{font-family:'Space Grotesk';letter-spacing:.16em;text-transform:uppercase;font-size:12px}
  .ascent-cap .n{font-family:'Space Mono';font-size:11px;color:var(--gold-2)}

  .quest{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:12px;transition:.2s}
  .quest.done{border-color:var(--gold);box-shadow:0 0 0 1px rgba(168,86,56,.18);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='170' height='130' viewBox='0 0 170 130'><g fill='none' stroke='%23a85638' stroke-width='1.2' opacity='0.16'><ellipse cx='130' cy='100' rx='18' ry='13'/><ellipse cx='130' cy='100' rx='34' ry='25'/><ellipse cx='130' cy='100' rx='52' ry='38'/><ellipse cx='130' cy='100' rx='72' ry='52'/></g></svg>");background-repeat:no-repeat;background-position:right -6px bottom -8px}
  .q-top{display:flex;align-items:center;gap:10px}
  .q-icon{flex:none;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--surface-2);color:var(--haze)}
  .quest.done .q-icon{background:var(--gold);color:var(--valley)}
  .q-tier{font-family:'Space Grotesk';font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:14px}
  .q-budget{font-family:'Space Mono';font-size:11px;color:var(--muted)}
  .q-prog-num{margin-left:auto;font-family:'Space Mono';font-size:13px;color:var(--mist)}
  .quest.done .q-prog-num{color:var(--gold-2)}

  .q-config{display:flex;align-items:center;gap:8px;margin:13px 0 11px;font-family:'Space Mono';font-size:12px;color:var(--muted);flex-wrap:wrap}
  .q-config select,.q-config input{font-family:'Space Mono';font-size:13px;background:var(--valley);color:var(--mist);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .q-config input{width:54px;text-align:center}
  .q-config select{cursor:pointer}

  .bar{height:8px;border-radius:999px;background:var(--valley);overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;border-radius:999px;background:var(--ink);transition:width .4s ease}
  .quest.done .bar > i{background:var(--gold)}

  .reward{margin-top:13px;border-top:1px solid var(--line);padding-top:13px}
  .reward-lead{display:flex;align-items:center;gap:7px;font-family:'Space Grotesk';letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--gold-2);margin-bottom:10px}
  .cats{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap}
  .cat{font-family:'Space Grotesk';font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
  .cat.active{border-color:var(--gold);color:var(--gold-2);background:rgba(232,164,76,.08)}
  .prize{display:flex;align-items:center;gap:12px;background:var(--valley);border:1px solid var(--line);border-radius:12px;padding:12px}
  .prize .info{flex:1;min-width:0}
  .prize .name{font-family:'Space Grotesk';font-weight:500;font-size:15px;letter-spacing:.02em}
  .prize .note{font-size:12px;color:var(--muted);margin-top:2px}
  .prize .price{font-family:'Space Mono';font-weight:700;color:var(--gold-2);font-size:14px;white-space:nowrap}
  .reroll{all:unset;cursor:pointer;flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--surface-2);color:var(--haze);transition:.2s}
  .reroll:hover{color:var(--gold-2)}
  .reroll:active{transform:rotate(180deg)}
  .locked{display:flex;align-items:center;gap:8px;margin-top:13px;font-size:12px;color:var(--muted);font-style:italic}

  /* ---- bottom nav ---- */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:5;display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom);
      background:linear-gradient(180deg,rgba(14,26,43,0),var(--valley) 38%);}
  nav .bar2{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px;margin:0 16px 14px;box-shadow:0 6px 22px rgba(35,36,31,.12)}
  nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:999px;color:var(--muted);font-family:'Space Grotesk';font-size:12px;letter-spacing:.09em;text-transform:uppercase;transition:.18s}
  nav button.active{color:var(--surface);background:var(--ink)}
  nav button svg{display:block}

  /* ---- bottom sheet ---- */
  .scrim{position:fixed;inset:0;z-index:20;background:rgba(35,36,31,.38);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;max-width:var(--maxw);margin:0 auto;background:var(--surface);border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .26s cubic-bezier(.22,.61,.36,1)}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:999px;background:var(--line);margin:6px auto 14px}
  .sheet h3{font-family:'Space Grotesk';font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:15px;margin:0 0 14px}
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
  .seg button{all:unset;cursor:pointer;text-align:center;padding:10px 4px;border-radius:11px;border:1px solid var(--line);font-family:'Space Grotesk';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:.15s}
  .seg button.active{color:var(--mist);border-color:transparent}
  .field{margin-bottom:13px}
  .field label{display:block;font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;font-family:'Space Mono';font-size:15px;background:var(--valley);color:var(--mist);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
  .field input:focus{outline:none;border-color:var(--haze)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .setlbl{display:block;font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:2px 0 9px}
  .setrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .setnum{font-family:'Space Mono';font-size:12px;color:var(--haze);width:16px;text-align:center;flex:none}
  .setrow input{flex:1;min-width:0;font-family:'Space Mono';font-size:15px;background:var(--valley);color:var(--mist);border:1px solid var(--line);border-radius:10px;padding:11px 8px;text-align:center}
  .setrow input:focus{outline:none;border-color:var(--haze)}
  .setrow .x{color:var(--muted);font-family:'Space Mono';flex:none}
  .setdel{all:unset;cursor:pointer;flex:none;width:30px;height:30px;display:grid;place-items:center;color:var(--muted);font-size:18px;border-radius:8px}
  .setdel:hover{color:#e88}
  .add-set{all:unset;cursor:pointer;display:block;text-align:center;width:100%;padding:9px;border:1px dashed var(--line);border-radius:10px;color:var(--haze);font-family:'Space Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .add-set:hover{border-color:var(--haze);color:var(--mist)}
  .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .btn{all:unset;cursor:pointer;text-align:center;flex:1;padding:14px;border-radius:13px;font-family:'Space Grotesk';letter-spacing:.14em;text-transform:uppercase;font-size:13px;font-weight:500;transition:.15s}
  .btn.primary{background:var(--ink);color:var(--valley)}
  .btn.primary:hover{background:var(--ink-soft)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .btn.ghost:hover{color:var(--mist)}
  .btn.danger{flex:none;width:52px;border:1px solid #e0c5bc;color:#a8472f}

  /* ---- lift launcher (in add sheet) ---- */
  .launch{display:flex;flex-direction:column;gap:9px}
  .launch-lbl{font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:8px 0 0}
  .routine-pick{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:13px;border:1px solid var(--line);border-radius:12px}
  .routine-pick:hover{border-color:var(--haze)}
  .routine-pick b{font-family:'Space Grotesk';font-size:14px;letter-spacing:.04em}
  .routine-pick i{display:block;font-style:normal;font-family:'Space Mono';font-size:11px;color:var(--muted);margin-top:2px}
  .routine-pick .go{font-family:'Space Grotesk';font-size:11px;letter-spacing:.1em;color:var(--haze)}
  .link-btn{all:unset;cursor:pointer;text-align:center;color:var(--haze);font-family:'Space Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:8px;margin-top:2px}
  .link-btn:hover{color:var(--mist)}

  /* ---- full workout screen ---- */
  .workout{position:fixed;inset:0;z-index:40;background:linear-gradient(180deg,var(--valley),var(--valley-2));display:none;flex-direction:column;overflow:hidden}
  .workout.show{display:flex}
  #workoutBody{display:flex;flex-direction:column;flex:1;min-height:0;width:100%}
  .wo-head{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.86);backdrop-filter:blur(6px)}
  .wo-back{all:unset;cursor:pointer;font-size:24px;color:var(--haze);width:30px;text-align:center;line-height:1}
  .wo-name{flex:1;min-width:0;background:transparent;border:none;color:var(--mist);font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:.06em}
  .wo-timer{display:inline-flex;align-items:center;gap:4px;font-family:'Space Mono';font-size:13px;color:var(--ink-soft);flex:none}
  .wo-timer .ic{width:13px;height:13px;color:var(--muted)}
  .wo-name:focus{outline:none}
  .wo-finish{all:unset;cursor:pointer;background:var(--ink);color:var(--valley);font-family:'Space Grotesk';font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;padding:9px 16px;border-radius:999px}
  .wo-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;max-width:var(--maxw);width:100%;margin:0 auto;padding:14px 14px calc(28px + env(safe-area-inset-bottom))}
  .wo-empty{text-align:center;color:var(--muted);font-style:italic;padding:36px 0;line-height:1.6}
  .ex-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:12px}
  .ex-head{display:flex;align-items:center;gap:10px}
  .ex-name{flex:1;font-family:'Space Grotesk';font-weight:500;font-size:15px;letter-spacing:.03em;color:var(--gold-2)}
  .ex-del{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .ex-del:hover{color:#e88}
  .ex-note{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--mist);font-size:13px;padding:7px 0;margin:8px 0 4px}
  .ex-note:focus{outline:none;border-color:var(--haze)}
  .set-head,.set-row{display:grid;grid-template-columns:26px 50px 1fr 1fr 34px 30px;gap:6px;align-items:center}
  .set-head{padding:9px 0 5px}
  .set-head span{font-family:'Space Grotesk';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center}
  .set-row{padding:5px 0}
  .set-row.done{background:rgba(35,36,31,.045);border-radius:8px}
  .set-row.pr-row{box-shadow:inset 3px 0 0 var(--gold)}
  .set-num{all:unset;cursor:pointer;text-align:center;font-family:'Space Mono';font-size:13px;color:var(--mist)}
  .set-num.warm{color:var(--gold)}
  .set-prev{font-family:'Space Mono';font-size:11px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden}
  .pr-tag{color:var(--gold-2);font-weight:700}
  .set-w,.set-r{min-width:0;width:100%;font-family:'Space Mono';font-size:14px;text-align:center;background:var(--valley);color:var(--mist);border:1px solid var(--line);border-radius:8px;padding:9px 4px}
  .set-w:focus,.set-r:focus{outline:none;border-color:var(--haze)}
  .set-check{all:unset;cursor:pointer;width:32px;height:32px;display:grid;place-items:center;border-radius:8px;border:1.5px solid var(--ridge-3);color:transparent;font-size:15px;font-weight:700}
  .set-check.on{background:var(--ink);border-color:var(--ink);color:var(--surface)}
  .set-del{all:unset;cursor:pointer;text-align:center;color:var(--muted);font-size:18px;height:32px;line-height:32px}
  .set-del:hover{color:#e88}
  .ex-addset{all:unset;cursor:pointer;display:block;text-align:center;width:100%;padding:8px;margin-top:8px;border:1px dashed var(--line);border-radius:9px;color:var(--haze);font-family:'Space Grotesk';font-size:10px;letter-spacing:.14em;text-transform:uppercase}
  .ex-addset:hover{border-color:var(--haze);color:var(--mist)}
  .wo-add{all:unset;cursor:pointer;display:block;text-align:center;width:100%;padding:13px;border-radius:12px;background:var(--surface-2);color:var(--mist);font-family:'Space Grotesk';font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
  .wo-add:hover{background:#e8e7e0}
  .wo-saveroutine{all:unset;cursor:pointer;display:block;text-align:center;width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;color:var(--haze);font-family:'Space Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .wo-saveroutine:hover{color:var(--mist);border-color:var(--haze)}

  /* ---- picker / routine manager ---- */
  .search{width:100%;font-size:15px;background:var(--valley);color:var(--mist);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:6px;font-family:'Inter'}
  .search:focus{outline:none;border-color:var(--haze)}
  .grp{font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--haze);margin:14px 0 7px}
  .ex-pick{all:unset;cursor:pointer;display:block;padding:11px 12px;border-radius:10px;font-size:14px;color:var(--mist)}
  .ex-pick:hover{background:var(--surface-2)}
  .ex-pick.added{color:var(--gold-2)}
  .picker-head{position:sticky;top:0;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);padding:6px 0 10px}
  .picker-head h3{margin:0}
  .picker-done{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--valley);background:var(--ink);padding:9px 17px;border-radius:999px;touch-action:manipulation}
  .picker-done:hover{background:var(--ink-soft)}
  .ex-check{color:var(--gold);font-weight:700;font-size:12px;letter-spacing:.04em}
  .custom-add{all:unset;cursor:pointer;display:block;text-align:center;padding:11px;border:1px dashed var(--gold);border-radius:11px;color:var(--gold-2);font-size:13px;margin:6px 0}
  .rt-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .rt-row b{font-family:'Space Grotesk';font-size:14px}
  .rt-row i{display:block;font-style:normal;font-family:'Space Mono';font-size:11px;color:var(--muted);margin-top:2px}
  #sheet2{max-height:82vh;overflow:auto}

  /* toast */
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(10px);z-index:60;background:var(--surface-2);color:var(--mist);border:1px solid var(--line);padding:10px 16px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- week plan/log layout ---- */
  .weekset{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 2px 12px}
  .eyebrow-t{font-family:'Space Grotesk';text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--haze)}
  .set-week-btn{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);border-radius:999px;padding:7px 14px}
  .set-week-btn:hover{background:var(--ink);color:var(--surface)}
  .day2{display:grid;grid-template-columns:108px 1fr;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .day2.today{border-color:var(--ink);box-shadow:0 0 0 1px rgba(35,36,31,.12)}
  .plan-col{padding:12px 11px;border-right:1px solid var(--line);background:var(--surface-2);cursor:pointer}
  .plan-col:hover{background:#edece5}
  .d-name{font-family:'Space Grotesk';font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase}
  .d-date{font-family:'Space Mono';font-size:10px;color:var(--muted);margin-left:5px;letter-spacing:0}
  .plan-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .pchip{font-family:'Space Grotesk';font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:999px;border:1px solid var(--ink);color:var(--ink)}
  .pchip.rest{border-style:dashed;border-color:var(--muted);color:var(--muted)}
  .plan-empty{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-style:italic;margin-top:8px}
  .log-col{padding:7px 12px 10px}
  .log-col .act:first-child{border-top:none}
  /* ---- planner sheet ---- */
  .plan-note{font-size:12px;color:var(--muted);margin:-4px 0 14px}
  .plan-prow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .plan-prow .pday{font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;width:40px;flex:none;padding-top:7px}
  .plan-toggles{display:flex;flex-wrap:wrap;gap:5px}
  .ptog{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:7px 11px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .ptog.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}
  .ptog.rest.on{background:var(--muted);border-color:var(--muted)}

  /* ---- hero numbers + branded empties ---- */
  .hero{padding:16px 4px 18px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .hero-num{font-family:'Space Grotesk';font-weight:700;font-size:46px;line-height:.92;letter-spacing:-.02em;color:var(--ink)}
  .hero-unit{font-family:'Space Grotesk';font-weight:500;font-size:17px;color:var(--muted);margin-left:6px;letter-spacing:0}
  .hero-sub{font-family:'Space Grotesk';text-transform:uppercase;letter-spacing:.16em;font-size:10px;color:var(--muted);margin-top:5px}
  .hero-stats{display:flex;flex-wrap:wrap;gap:16px;margin-top:13px;font-family:'Space Mono';font-size:12px;color:var(--ink-soft)}
  .hero-stats b{color:var(--ink)}
  .hero-empty{display:flex;flex-direction:column;align-items:flex-start;gap:9px}
  .hero-prompt{font-family:'Space Grotesk';font-size:16px;color:var(--ink);letter-spacing:.01em}
  .empty2{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-style:italic;padding:7px 0}

  /* ---- responsive plan/log + quest config + streak + welcome ---- */
  .plan-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  @media (max-width:440px){
    .day2{grid-template-columns:1fr}
    .plan-col{border-right:none;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px}
    .plan-col .plan-chips,.plan-col .plan-empty{margin-top:0}
    .hero-num{font-size:40px}
  }
  .q-config2{margin:13px 0 11px}
  .stepper{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .stepper .step{all:unset;cursor:pointer;width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line);border-radius:9px;font-size:18px;color:var(--ink)}
  .stepper .step:hover{border-color:var(--ink)}
  .step-val{font-family:'Space Mono';font-weight:700;font-size:18px;min-width:24px;text-align:center}
  .step-lbl{font-family:'Space Grotesk';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .qseg{display:flex;flex-wrap:wrap;gap:5px}
  .qsegb{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:7px 11px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .qsegb.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}
  .streak{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);margin:4px 2px 14px}
  .streak svg{flex:none}
  .streak b{font-family:'Space Mono';font-weight:700;color:var(--ink);font-size:15px}
  .peaks{display:flex;flex-direction:column;gap:8px}
  .peak{all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface)}
  .peak:hover{border-color:var(--haze)}
  .peak.cur{border-color:var(--ink)}
  .peak-range{font-family:'Space Mono';font-size:13px;color:var(--ink);flex:1}
  .peak-dots{display:flex;gap:5px}
  .peak-dots i{width:8px;height:8px;border-radius:50%;border:1.4px solid var(--ridge-2);display:block}
  .peak-dots i.on{background:var(--gold);border-color:var(--gold)}
  .peak-label{font-family:'Space Grotesk';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);width:52px;text-align:right}
  .toast{display:flex;align-items:center;gap:14px}
  .toast.show{pointer-events:auto}
  .toast-undo{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);font-weight:600}
  .arm{color:#b03b22 !important;font-weight:700;transform:scale(1.15)}
  .welcome{position:fixed;inset:0;z-index:70;background:linear-gradient(180deg,#eef2f5,#dfe6ea);display:none;align-items:center;justify-content:center;padding:28px}
  .welcome.show{display:flex}
  .welcome-inner{max-width:360px;width:100%;text-align:center}
  .welcome h2{font-family:'Space Grotesk';font-weight:600;font-size:30px;letter-spacing:.16em;margin:14px 0 2px}
  .tagline{color:var(--ink-soft);font-size:15px;margin:0 0 26px}
  .wsteps{display:flex;flex-direction:column;gap:15px;text-align:left;margin-bottom:26px}
  .wstep{display:flex;align-items:center;gap:13px}
  .wstep .wn{flex:none;width:30px;height:30px;border-radius:50%;border:1px solid var(--ink);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:600;font-size:13px}
  .wstep b{font-family:'Space Grotesk';font-weight:600;letter-spacing:.03em;display:block;font-size:14px}
  .wstep span{font-size:12.5px;color:var(--muted)}
  .welcome .btn.primary{margin-bottom:4px}

  /* ---- mobile polish ---- */
  button{touch-action:manipulation;-webkit-user-select:none;user-select:none}
  .wo-scroll,#sheet,#sheet2{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .btn:active,.wo-add:active,.add-btn:active,.set-week-btn:active,.wo-finish:active,nav button:active,.set-check:active,.step:active{transform:scale(.97)}
  @media (max-width:440px){
    input,textarea,select{font-size:16px}
    .set-w,.set-r{font-size:16px;padding:10px 4px}
    .ex-note{font-size:14px}
    .search,.field input{font-size:16px}
  }

  /* ---- final cleanups: icons, settings, streak, finish ---- */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-.13em;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .ic-sun,.ic-peak{width:1.05em;height:1.05em;display:inline-block;vertical-align:-.16em;flex:none}
  .pr-mark{color:var(--gold);font-weight:700}
  .ex-del{all:unset;cursor:pointer;color:var(--muted);width:34px;height:34px;display:grid;place-items:center;font-size:18px}
  .ex-del:hover{color:#b03b22}
  .hdr-right{display:flex;align-items:center;gap:8px}
  .gear{all:unset;cursor:pointer;width:38px;height:38px;display:grid;place-items:center;border-radius:50%;color:var(--haze);font-size:20px}
  .gear:hover{background:var(--surface-2);color:var(--ink)}
  .wk{cursor:pointer}
  .streak-top{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;margin-bottom:14px;font-size:14px;color:var(--ink-soft)}
  .streak-top svg{flex:none}
  .streak-top b{font-family:'Space Mono';font-weight:700;color:var(--ink);font-size:17px}
  .set-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .set-row2{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px;border:1px solid var(--line);border-radius:12px}
  .set-row2:hover{border-color:var(--haze)}
  .set-row2 b{font-family:'Space Grotesk';font-size:14px;letter-spacing:.02em;display:block}
  .set-row2 span{font-size:12px;color:var(--muted);display:block;margin-top:2px}
  .set-row2.danger-row b{color:#a8472f}
  .unit-toggle{display:flex;gap:4px;flex:none}
  .ut{all:unset;cursor:pointer;font-family:'Space Mono';font-size:13px;padding:7px 13px;border-radius:8px;border:1px solid var(--line);color:var(--muted)}
  .ut.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}
  .finishpop{position:fixed;inset:0;z-index:65;display:none;align-items:center;justify-content:center;pointer-events:none}
  .finishpop.show{display:flex;animation:fpin .25s ease}
  @keyframes fpin{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  .fp-card{background:var(--ink);color:var(--surface);border-radius:18px;padding:22px 30px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.28)}
  .fp-card .ic-peak{color:var(--gold-2);width:26px;height:26px}
  .fp-main{font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.01em;margin-top:4px}
  .fp-sub{font-family:'Space Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b9b7ae;margin-top:5px}

  /* ---- reward setup + quest edit + locked ---- */
  .rsetup{position:fixed;inset:0;z-index:72;background:linear-gradient(180deg,#eef2f5,#dfe6ea);display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .rsetup.show{display:block}
  .rsetup-inner{max-width:var(--maxw);margin:0 auto;padding:calc(22px + env(safe-area-inset-top)) 18px calc(30px + env(safe-area-inset-bottom))}
  .rs-head h2{font-family:'Space Grotesk';font-weight:600;font-size:24px;letter-spacing:.01em;margin:4px 0 3px}
  .rs-head .tagline{font-size:14px;color:var(--ink-soft);line-height:1.5;margin:0}
  .rs-int{margin:20px 0 4px}
  .rs-step{font-family:'Space Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .rs-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
  .rs-tile{all:unset;cursor:pointer;display:flex;flex-direction:column;gap:3px;padding:13px;border:1px solid var(--line);border-radius:13px;background:var(--surface);touch-action:manipulation;transition:border-color .12s,box-shadow .12s}
  .rs-tile.on{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
  .rs-tile-l{font-family:'Space Grotesk';font-weight:600;font-size:15px;letter-spacing:.01em}
  .rs-tile-s{font-size:11px;color:var(--muted);line-height:1.35}
  .rs-tile.on .rs-tile-s{color:var(--ink-soft)}
  .rs-sec{margin-top:16px}
  .rs-sec-h{font-family:'Space Grotesk';font-weight:600;font-size:14px;letter-spacing:.02em;margin-bottom:9px}
  .rs-chip.on{border-color:var(--ink);background:var(--ink);color:var(--surface)}
  .rs-lbl{font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .rs-chips{display:flex;flex-wrap:wrap;gap:7px}
  .rs-chip{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--ink-soft);touch-action:manipulation}
  .rs-chip:hover{border-color:var(--ink);color:var(--ink)}
  .rs-chip .ic{width:12px;height:12px}
  .rs-tier{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px}
  .rs-tier-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
  .rs-budget{width:80px;font-family:'Space Mono';font-size:14px;text-align:center;background:var(--valley);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px}
  .rs-items{display:flex;flex-wrap:wrap;gap:7px;min-height:6px;margin-bottom:11px}
  .rs-item{display:inline-flex;align-items:center;gap:4px;font-size:13px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:6px 6px 6px 12px}
  .rs-del{all:unset;cursor:pointer;color:var(--muted);width:22px;height:22px;display:grid;place-items:center}
  .rs-del:hover{color:#b03b22}
  .rs-del .ic{width:13px;height:13px}
  .rs-empty{font-size:12px;color:var(--muted);font-style:italic}
  .rs-add{display:flex;gap:8px}
  .rs-input{flex:1;min-width:0;font-size:15px;background:var(--valley);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .rs-addbtn{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 16px;display:grid;place-items:center;border:1px solid var(--ink);border-radius:10px;color:var(--ink);touch-action:manipulation}
  .rs-addbtn:hover{background:var(--ink);color:var(--surface)}
  .qedit{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .qedit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .q-readout{display:flex;align-items:center;justify-content:space-between;margin:13px 0 11px;font-family:'Space Mono';font-size:14px;color:var(--ink)}
  .q-lock{display:inline-flex;align-items:center;gap:5px;font-family:'Space Grotesk';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .q-lock .ic{width:13px;height:13px}
  .lock-note{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin:-6px 2px 12px}
  .lock-note .ic{width:13px;height:13px;flex:none}

  .wo-delete{all:unset;cursor:pointer;display:block;text-align:center;margin:4px auto 8px;font-family:'Space Grotesk';font-size:12px;letter-spacing:.04em;color:var(--muted);padding:11px}
  .wo-delete:hover{color:#b03b22}
  .wo-delete.arm{color:#fff;background:#b03b22;border-radius:10px}
  .rs-mic{all:unset;cursor:pointer;width:46px;display:grid;place-items:center;border:1px solid var(--line);border-radius:10px;color:var(--ink);touch-action:manipulation}
  .rs-mic .ic{width:18px;height:18px}
  .rs-mic[disabled]{opacity:.4}
  .rs-mic.listening{background:#b03b22;border-color:#b03b22;color:#fff;animation:micpulse 1s ease-in-out infinite}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .rs-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
  .rs-clear{all:unset;cursor:pointer;font-family:'Space Grotesk';font-size:11px;letter-spacing:.04em;color:var(--muted)}
  .rs-clear:hover{color:#b03b22}
  .rs-count{font-family:'Space Mono';font-size:11px;color:var(--muted);text-align:right}
  .bp-sec{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
  .bp-h{font-family:'Space Grotesk';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--haze);margin-bottom:14px}
  .bp-row{margin-bottom:14px}
  .bp-top{display:flex;align-items:baseline;justify-content:space-between}
  .bp-name{font-family:'Space Grotesk';font-weight:600;font-size:14px;letter-spacing:.01em}
  .bp-times{font-family:'Space Mono';font-weight:700;font-size:16px;color:var(--ink)}
  .bp-times small{font-size:11px;color:var(--muted);margin-left:1px}
  .bp-bar{height:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:99px;overflow:hidden;margin:6px 0 5px}
  .bp-bar i{display:block;height:100%;background:var(--ink);border-radius:99px;transition:width .3s ease}
  .bp-meta{font-family:'Space Mono';font-size:11px;color:var(--muted)}
  .hist-head{margin-bottom:4px}
  .hist-title{font-family:'Space Grotesk';font-weight:600;font-size:24px;letter-spacing:.01em;margin:4px 0 3px}

}

function mSlug(x){ return String(x||'lift').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'x'; }
function migrateAct(a){
  if(!a||typeof a!=='object') return;
  if(!a.id) a.id='a'+Math.random().toString(36).slice(2,9);
  a.done=!!a.done;
  if(!a.data||typeof a.data!=='object') a.data={};
  if(a.type==='run'){ a.type='cardio'; if(!a.data.mode)a.data.mode='run'; }
  else if(a.type==='sprint'){ a.type='cardio'; if(!a.data.mode)a.data.mode='sprint'; }
  if(a.type==='cardio' && !a.data.mode) a.data.mode='run';
  if(a.type==='lift'){
    const d=a.data;
    if(!Array.isArray(d.exercises)){
      if(d.exercise||Array.isArray(d.sets)) d.exercises=[{exId:mSlug(d.exercise||'lift'),name:d.exercise||'Lift',note:d.note||'',sets:Array.isArray(d.sets)?d.sets:[]}];
      else d.exercises=[];
    }
    d.exercises.forEach(ex=>{
      if(!ex.exId) ex.exId=mSlug(ex.name||'lift');
      if(typeof ex.name!=='string') ex.name='Lift';
      if(typeof ex.note!=='string') ex.note='';
      if(!Array.isArray(ex.sets)) ex.sets=[];
      ex.sets.forEach(s=>{ if(!s||typeof s!=='object')return; s.warmup=!!s.warmup; s.done=!!s.done; if(s.reps==null)s.reps=''; if(s.weight==null)s.weight=''; });
    });
  }
}
function migrate(db){
  try{
    db=(db&&typeof db==='object')?db:{};
    if(!db.weeks||typeof db.weeks!=='object') db.weeks={};
    if(typeof db.unit!=='string') db.unit='lb';
    db.onboarded=!!db.onboarded;
    const tiers=['basecamp','ridgeline','summit'], defB={basecamp:'~$20',ridgeline:'~$50',summit:'~$100'};
    if(!db.rewards||typeof db.rewards!=='object') db.rewards={};
    tiers.forEach(tk=>{ let arr=Array.isArray(db.rewards[tk])?db.rewards[tk]:[]; db.rewards[tk]=arr.map(it=>typeof it==='string'?it:(it&&(it.name||it.n))?String(it.name||it.n):'').filter(Boolean); });
    if(!db.budgets||typeof db.budgets!=='object') db.budgets={};
    tiers.forEach(tk=>{ if(typeof db.budgets[tk]!=='string'||!db.budgets[tk]) db.budgets[tk]=defB[tk]; });
    if(!db.exHistory||typeof db.exHistory!=='object') db.exHistory={};
    Object.keys(db.weeks).forEach(wk=>{
      const W=db.weeks[wk]; if(!W||typeof W!=='object'){ delete db.weeks[wk]; return; }
      if(!W.acts||typeof W.acts!=='object') W.acts={};
      if(!W.plan||typeof W.plan!=='object') W.plan={};
      DAYS.forEach(d=>{
        if(!Array.isArray(W.acts[d])) W.acts[d]=[];
        if(!Array.isArray(W.plan[d])) W.plan[d]=[];
        W.plan[d]=[...new Set(W.plan[d].map(t=>t==='run'||t==='sprint'?'cardio':t))];
        W.acts[d].forEach(migrateAct);
      });
      W.locked=!!W.locked;
      if(Array.isArray(W.quests)) W.quests.forEach(q=>{ if(!q)return;
        if(!q.kind){
          q.kind = q.tier==='basecamp'?'lifts':q.tier==='ridgeline'?'miles':'sessions';
          if(q.kind==='miles' && q.type) q.target=Math.max(4,(q.target||3)*3);  // old session count -> rough miles
          delete q.type;
        }
        if(q.reward&&typeof q.reward==='object'&&!q.reward.name&&q.reward.n) q.reward.name=q.reward.n; });
    });
    db.version=2;
    return db;
  }catch(e){ return (db&&typeof db==='object')?db:{weeks:{}}; }
}

      if(!d.exercises.length) return `${nm} · empty`;

      return `${nm} · ${d.exercises.length} exercise${d.exercises.length>1?'s':''}${dur}`;

      return parts.length?`${ex} · ${parts.join(', ')}`:ex;

function weekTrainStreaks(){

  Object.keys(map).forEach(dt=>mons.add(iso(mondayOf(new Date(dt+'T00:00:00')))));
  if(!mons.size) return {cur:0,longest:0};
  const base=new Date('2020-01-06T00:00:00');
  const idx=[...mons].map(k=>Math.round((new Date(k+'T00:00:00')-base)/(7*86400000))).sort((a,b)=>a-b);
  const has=new Set(idx); let longest=1,run=1;

  const thisIdx=Math.round((mondayOf(new Date())-base)/(7*86400000));
  let cur=0,k=has.has(thisIdx)?thisIdx:thisIdx-1; while(has.has(k)){cur++;k--;}
  return {cur,longest};
}

function hasAnyData(){ return Object.values(DB.weeks||{}).some(w=>w&&w.acts&&DAYS.some(d=>(w.acts[d]||[]).length)) || Object.keys(DB.exHistory||{}).length>0; }
function backupNudgeHTML(){

function campIcon(tier){

}

/* ascent signature: climber rises through the 3 camps */
function ascentAlt(states){
  let alt=0;
  for(let i=0;i<3;i++){
    if(states[i].done) alt+=1;
    else { alt += states[i].q.target>0 ? Math.min(1,states[i].prog/states[i].q.target):0; break; }
  }
  return alt;
}
function ascentPhase(alt){
  if(alt>=3) return 'Summit · golden hour';
  if(alt>=2) return 'High on the ridge';
  if(alt>=1) return 'On the trail';
  if(alt>0)  return 'Leaving the valley';
  return 'Dawn in the valley';
}
function lerpHex(a,b,t){
  const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));
  const A=p(a),B=p(b);
  return '#'+A.map((v,i)=>Math.round(v+(B[i]-v)*t).toString(16).padStart(2,'0')).join('');
}
function ascentSVG(states){
  const W=520,H=190;
  const start={x:26,y:166}, camps=[{x:152,y:124},{x:290,y:86},{x:452,y:40}];
  const pts=[start,...camps];
  const alt=ascentAlt(states), prog=alt/3;
  const seg=Math.min(3,Math.floor(alt)), frac=alt-seg;
  const A=pts[Math.min(seg,3)], B=pts[Math.min(seg+1,3)];
  const cx=A.x+(B.x-A.x)*frac, cy=A.y+(B.y-A.y)*frac;
  const ridge=`M0,182 L${start.x},${start.y} L${camps[0].x},${camps[0].y} L214,110 L${camps[1].x},${camps[1].y} L372,66 L${camps[2].x},${camps[2].y} L520,26`;
  const trail=`M${start.x},${start.y} L${camps[0].x},${camps[0].y} L${camps[1].x},${camps[1].y} L${camps[2].x},${camps[2].y}`;
  const trailDone=`M${start.x},${start.y} L${cx},${cy}`;
  const sunX=466, sunY=58-prog*26, sunR=(10+prog*2).toFixed(1);
  const sunFill=states[2].done?'#c25b3c':lerpHex('#aebfc9','#c25b3c',prog);
  const glowA=(0.05+prog*0.5).toFixed(2), washA=(prog*0.14).toFixed(2);
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Ascent progress">
    <defs>
      <radialGradient id="ag-glow"><stop offset="0" stop-color="#c25b3c" stop-opacity="${glowA}"/><stop offset="100%" stop-color="#c25b3c" stop-opacity="0"/></radialGradient>
      <linearGradient id="ag-wash" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c25b3c" stop-opacity="${washA}"/><stop offset="62%" stop-color="#c25b3c" stop-opacity="0"/></linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#ag-wash)"/>
    <circle cx="${sunX}" cy="${sunY}" r="${40+prog*46}" fill="url(#ag-glow)"/>
    <path d="M0,150 L100,120 L170,140 L260,104 L340,126 L440,92 L520,118" fill="none" stroke="#b9c6d0" stroke-width="1.2"/>
    <path d="M0,168 L80,150 L170,166 L270,132 L360,158 L460,124 L520,148" fill="none" stroke="#9fb1bd" stroke-width="1.2"/>
    <path d="${ridge} L520,190 L0,190 Z" fill="#e5ebef"/>
    <g stroke="#cfd9e0" stroke-width="1" fill="none">
      <path d="M30,176 C120,168 210,176 300,166 C390,158 460,166 520,158"/>
      <path d="M70,185 C150,180 250,184 340,176 C420,170 480,176 520,170"/>
    </g>
    <path d="${ridge}" fill="none" stroke="#1e2c35" stroke-width="1.8" stroke-linejoin="round"/>
    <circle cx="${sunX}" cy="${sunY}" r="${sunR}" fill="${sunFill}" ${states[2].done?'':'stroke="#9fb1bd" stroke-width="1"'}/>
    <path d="${trail}" fill="none" stroke="#8ea0ac" stroke-width="1.4" stroke-dasharray="2 6" stroke-linecap="round"/>
    <path d="${trailDone}" fill="none" stroke="#1e2c35" stroke-width="2" stroke-linecap="round"/>
    ${camps.map((c,i)=>{
      const done=states[i].done;
      return `<g>
        <circle cx="${c.x}" cy="${c.y}" r="5" fill="${done?'#c25b3c':'#ffffff'}" stroke="${done?'#c25b3c':'#9fb1bd'}" stroke-width="1.6"/>
        <text x="${c.x}" y="${c.y-12}" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" letter-spacing="1" fill="${done?'#c25b3c':'#677781'}">${tierOf(states[i].q.tier).name.toUpperCase()}</text>
      </g>`;
    }).join('')}
    <circle cx="${cx}" cy="${cy}" r="5.5" fill="#ffffff" stroke="#1e2c35" stroke-width="1.6"/>
    <circle cx="${cx}" cy="${cy}" r="2.2" fill="#1e2c35"/>
  </svg>`;
}

function budgetLabel(tierKey){ return (DB.budgets&&DB.budgets[tierKey])||(tierOf(tierKey)?tierOf(tierKey).budget:''); }
function typeLabel(tp){ return tp==='any'?'any session':(TYPES[tp]?TYPES[tp].label:tp); }
function rollReward(tierKey){
  const pool=(DB.rewards&&DB.rewards[tierKey])||[];
  if(!pool.length) return {name:'Treat yourself', price:budgetLabel(tierKey)};
  const claimed=(DB.claims||[]).filter(c=>c.tier===tierKey).map(c=>c.name);
  const recent=new Set(claimed.slice(-(pool.length-1)));  // rest of pool must cycle before repeat
  const fresh=pool.filter(p=>!recent.has(p));
  const pick=(fresh.length?fresh:pool);
  return {name:pick[Math.floor(Math.random()*pick.length)], price:budgetLabel(tierKey)};
}
function claimReward(i){
  const q=week().quests[i]; if(!q||!q.reward||q.reward.claimed) return;
  q.reward.claimed=iso(new Date());
  if(!Array.isArray(DB.claims)) DB.claims=[];
  DB.claims.push({tier:q.tier,name:q.reward.name||q.reward.n||'Reward',date:q.reward.claimed});
  save(); render(); flash('Claimed — go get it');
}

const scrim=document.getElementById('scrim'), sheet=document.getElementById('sheet'), sheetBody=document.getElementById('sheetBody');

function readFields(){
  const t=editing.type, g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  if(t==='cardio'){ const mode=editing.data.mode||'run'; const o={mode,time:g('f_time')}; if(mode==='sprint') o.reps=g('f_reps'); else o.distance=g('f_distance'); return o; }
  if(t==='lift'){
    const rows=[...document.querySelectorAll('#fields .setrow')];
    const sets=rows.map(r=>({reps:r.querySelector('.s_reps').value.trim(),weight:r.querySelector('.s_weight').value.trim()}));
    return {exercise:g('f_exercise'),sets};
  }
  return {name:g('f_name')};
}

view.addEventListener('click',e=>{
  const t=e.target.closest('[data-openplanner],[data-toggle],[data-edit],[data-del],[data-add],[data-qroll],[data-qstep],[data-qkind],[data-loadweek],[data-histex],[data-bpwin],[data-bkup],[data-bkx],[data-startlifttoday],[data-claim]');
  if(!t) return;
  if(t.dataset.startlifttoday!==undefined){ const d=DAYS[(new Date().getDay()+6)%7]; startLift(d,null); return; }
  if(t.dataset.claim!==undefined){ claimReward(+t.dataset.claim); return; }
  if(t.dataset.bkup!==undefined){ exportData(); return; }
  if(t.dataset.bkx!==undefined){ DB.bkDismiss=Date.now(); save(); render(); return; }
  if(t.dataset.histex){ histEx=t.dataset.histex; render(); return; }
  if(t.dataset.bpwin){ bpWin=t.dataset.bpwin; render(); return; }
  if(t.dataset.openplanner!==undefined){ openPlanner(); return; }
  if(t.dataset.toggle){ const [d,id]=t.dataset.toggle.split(':'); const a=week().acts[d].find(x=>x.id===id); a.done=!a.done; save(); render(); return; }
  if(t.dataset.del){ armDelete('del:'+t.dataset.del, t, ()=>{ const [d,id]=t.dataset.del.split(':'); const arr=week().acts[d]; const idx=arr.findIndex(x=>x.id===id); if(idx>-1){ arr.splice(idx,1); save(); render(); } }); return; }
  if(t.dataset.edit){ const [d,id]=t.dataset.edit.split(':'); openSheet(d,id); return; }
  if(t.dataset.add!==undefined){ openSheet(t.dataset.add,null); return; }
  if(t.dataset.qstep){ const [i,d]=t.dataset.qstep.split(':'); const q=week().quests[+i]; const kind=questKind(q); const step=kind==='reps'?2:1; q.target=Math.max(1,Math.min(kind==='miles'?200:kind==='reps'?300:60,(q.target||1)+(+d)*step)); q.reward=null; save(); render(); return; }
  if(t.dataset.qkind){ const [i,v]=t.dataset.qkind.split(':'); const q=week().quests[+i]; if(questKind(q)!==v){ q.kind=v; delete q.type; q.target=v==='miles'?8:v==='reps'?16:v==='lifts'?3:6; q.reward=null; save(); render(); } return; }
  if(t.dataset.loadweek){ curMon=mondayOf(new Date(t.dataset.loadweek+'T00:00:00')); render(); return; }
  if(t.dataset.qroll){ const i=+t.dataset.qroll; const q=week().quests[i]; if(q.reward&&q.reward.claimed)return; q.reward=rollReward(q.tier); save(); render(); return; }
});

sheet.addEventListener('click',e=>{
  const tBtn=e.target.closest('[data-type]');
  if(tBtn){ editing.data=readFields(); editing.type=tBtn.dataset.type; renderSheet(); return; }
  const mBtn=e.target.closest('[data-mode]');
  if(mBtn){ editing.data=readFields(); editing.data.mode=mBtn.dataset.mode; renderSheet(); return; }
  const sl=e.target.closest('[data-startlift]');
  if(sl){ startLift(editing.day, sl.dataset.startlift||null); return; }
  if(e.target.closest('[data-manageroutines]')){ openRoutineManager(); return; }
  const sd=e.target.closest('[data-setdel]');
  if(sd){ editing.data=readFields(); editing.data.sets.splice(+sd.dataset.setdel,1); if(!editing.data.sets.length) editing.data.sets.push({reps:'',weight:''}); renderSheet(); return; }
  if(e.target.id==='addSet'){ editing.data=readFields(); editing.data.sets=editing.data.sets||[]; editing.data.sets.push({reps:'',weight:''}); renderSheet(); return; }
  if(e.target.id==='cancelAct') return closeSheet();
  if(e.target.id==='delAct'){ const w=week(); w.acts[editing.day]=w.acts[editing.day].filter(a=>a.id!==editing.id); save(); closeSheet(); render(); return; }
  if(e.target.id==='saveAct'){
    const data=readFields(); const w=week();
    if(editing.id){ const a=w.acts[editing.day].find(x=>x.id===editing.id); a.type=editing.type; a.data=data; }
    else { w.acts[editing.day].push({id:uid(),type:editing.type,done:false,data}); }
    save(); closeSheet(); render(); return;
  }
});

const EX_GROUP={}; Object.keys(LIB).forEach(g=>LIB[g].forEach(x=>EX_GROUP[x.id]=g));
function exGroupOf(id){ return EX_GROUP[id]||'Other'; }
function bodyPartStats(winDays){
  const H=DB.exHistory||{}, G={};
  let cutoff=null;
  if(winDays){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-(winDays-1)); cutoff=iso(d); }
  Object.keys(H).forEach(exId=>{
    const grp=exGroupOf(exId), sess=(H[exId]&&H[exId].sessions)||{};
    Object.keys(sess).forEach(aid=>{
      const s=sess[aid];
      if(cutoff && (!s.date || s.date<cutoff)) return;
      const o=G[grp]||(G[grp]={ses:new Set(),sets:0,last:''});
      o.ses.add(aid); o.sets+=(s.sets?s.sets.length:0);
      if(s.date&&s.date>o.last) o.last=s.date;
    });
  });
  const order=['Chest','Back','Shoulders','Legs','Arms','Core','Olympic','Other'];
  return Object.keys(G).map(g=>({group:g,times:G[g].ses.size,sets:G[g].sets,last:G[g].last}))
    .sort((a,b)=>b.times-a.times||order.indexOf(a.group)-order.indexOf(b.group));
}
function daysAgo(dISO){ if(!dISO)return''; const d=new Date(dISO+'T00:00:00'),n=new Date(); n.setHours(0,0,0,0); const x=Math.round((n-d)/86400000); return x<=0?'today':x===1?'1d ago':x+'d ago'; }
function mmFill(t,max){ if(!t) return 'var(--surface-2)'; const r=max?t/max:0; return r>=0.8?'#1e2c35':r>=0.55?'#3f5666':r>=0.32?'#6f8a98':'#a8bcc6'; }

  const ME=(cx,cy,rx,ry,c,g)=>E(cx,cy,rx,ry,g)+E(2*c-cx,cy,rx,ry,g);
  const cf=75, cb=225;

    +`<circle cx="75" cy="22" r="12" fill="${NEU}"/><polygon points="69,33 81,33 80,42 70,42" fill="${NEU}"/>`

    +MP([[62,50],[74,52],[74,71],[60,69],[59,57]],cf,'Chest')

    +`<g stroke="var(--line)" stroke-width="0.8" opacity=".5"><line x1="75" y1="72" x2="75" y2="112"/><line x1="67" y1="84" x2="83" y2="84"/><line x1="67" y1="94" x2="83" y2="94"/><line x1="67" y1="104" x2="83" y2="104"/></g>`;
  let back=''
    +`<circle cx="225" cy="22" r="12" fill="${NEU}"/><polygon points="219,33 231,33 230,42 220,42" fill="${NEU}"/>`
    +MP([[212,40],[225,39],[225,66],[216,60]],cb,'Back')
    +MP([[198,46],[213,45],[215,60],[200,63]],cb,'Shoulders')
    +MP([[210,60],[224,64],[221,95],[207,84]],cb,'Back')
    +P([[219,86],[231,86],[229,112],[221,112]],'Back')
    +ME(198,74,7,15,cb,'Arms')+ME(195,101,6,15,cb,'Arms')
    +ME(217,122,9,11,cb,'Legs')
    +MP([[212,130],[224,130],[222,174],[214,174]],cb,'Legs')
    +ME(217,200,6,16,cb,'Legs');
  return `<div class="mmap"><svg viewBox="0 0 300 250" class="mmap-svg" aria-label="Muscle map">
    <g stroke="var(--line)" stroke-width="0.8" stroke-linejoin="round">${front}${back}</g>
    <text x="75" y="246" class="mm-cap">Front</text><text x="225" y="246" class="mm-cap">Back</text>
  </svg><div class="mm-note">Darker = trained more this window</div></div>`;
}
function bodyPartHTML(){
  if(!bodyPartStats(0).length) return '';
  const winDays=bpWin==='7'?7:bpWin==='14'?14:bpWin==='28'?28:0;
  const stats=bodyPartStats(winDays);
  const max=Math.max.apply(null,stats.map(s=>s.times).concat(1));
  const seg=[['all','All'],['7','7d'],['14','14d'],['28','28d']].map(([v,l])=>`<button class="bp-seg-b ${bpWin===v?'on':''}" data-bpwin="${v}">${l}</button>`).join('');
  let h=`<div class="bp-sec"><div class="bp-h">Body parts · times trained</div><div class="bp-seg">${seg}</div>`;
  if(!stats.length) return h+`<div class="hsec-meta" style="padding:4px 0">Nothing logged in this window.</div></div>`;
  stats.forEach(s=>{
    h+=`<div class="bp-row">
      <div class="bp-top"><span class="bp-name">${s.group}</span><span class="bp-times">${s.times}<small>×</small></span></div>
      <div class="bp-bar"><i style="width:${Math.round(s.times/max*100)}%"></i></div>
      <div class="bp-meta">${s.sets} working sets${s.last?` · last ${daysAgo(s.last)}`:''}</div>
    </div>`;
  });
  return h+`</div>`;
}

const slug=s=>String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'x';
const num=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};
function fmtDur(sec){ sec=Math.max(0,Math.round(sec)); const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60; return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`; }
const e1rm=s=>{const w=num(s.weight),r=num(s.reps);return (w>0&&r>0)?w*(1+r/30):0;};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escAttr=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
function flash(msg,undoFn){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.innerHTML=`<span>${esc(msg)}</span>`+(undoFn?`<button class="toast-undo">Undo</button>`:'');
  t.classList.add('show');
  clearTimeout(flash._t);
  flash._t=setTimeout(()=>t.classList.remove('show'),undoFn?5000:1700);
  if(undoFn){ t.querySelector('.toast-undo').onclick=()=>{ undoFn(); t.classList.remove('show'); clearTimeout(flash._t); }; }
}
let armed={key:null,el:null,t:null};
function armDelete(key,el,onConfirm){
  if(armed.key===key){ clearTimeout(armed.t); if(armed.el)armed.el.classList.remove('arm'); armed={key:null,el:null,t:null}; onConfirm(); return; }
  if(armed.el)armed.el.classList.remove('arm');
  clearTimeout(armed.t);
  if(el)el.classList.add('arm');
  armed={key,el,t:setTimeout(()=>{ if(armed.el)armed.el.classList.remove('arm'); armed={key:null,el:null,t:null}; },2200)};
  flash('Tap again to delete');
}

function bestE1RM(exId,excl){const h=DB.exHistory&&DB.exHistory[exId];if(!h||!h.sessions)return 0;let best=0;Object.entries(h.sessions).forEach(([aid,s])=>{if(aid===excl)return;s.sets.forEach(x=>best=Math.max(best,e1rm(x)));});return best;}
function prevSession(exId,excl){const h=DB.exHistory&&DB.exHistory[exId];if(!h||!h.sessions)return [];let pick=null;Object.entries(h.sessions).forEach(([aid,s])=>{if(aid===excl)return;if(!pick||s.date>pick.date)pick=s;});return pick?pick.sets:[];}
function commitHistory(act,dateISO){
  DB.exHistory=DB.exHistory||{};
  Object.values(DB.exHistory).forEach(h=>{if(h.sessions)delete h.sessions[act.id];});
  (act.data.exercises||[]).forEach(ex=>{
    const sets=ex.sets.filter(s=>!s.warmup&&num(s.weight)>0&&num(s.reps)>0).map(s=>({weight:num(s.weight),reps:num(s.reps)}));
    if(!sets.length)return;
    DB.exHistory[ex.exId]=DB.exHistory[ex.exId]||{sessions:{}};
    DB.exHistory[ex.exId].sessions[act.id]={date:dateISO,sets};
  });
}

function workoutVolume(act){
  let v=0;
  (act.data.exercises||[]).forEach(ex=>ex.sets.forEach(s=>{ if(!s.warmup){ const w=num(s.weight),r=num(s.reps); if(w>0&&r>0) v+=w*r; } }));
  return Math.round(v);
}
function workoutHasPR(act){
  return (act.data.exercises||[]).some(ex=>{ const best=bestE1RM(ex.exId,act.id); return ex.sets.some(s=>!s.warmup && e1rm(s)>0 && e1rm(s)>best+0.01); });
}

function startLift(day,routineId){
  const w=week(), id=uid(); let name='Lift', exercises=[];
  if(routineId){ const rt=(DB.routines||[]).find(r=>r.id===routineId); if(rt){ name=rt.name; exercises=rt.exercises.map(x=>({exId:x.exId,name:x.name,note:x.note||'',sets:x.sets.map(s=>({reps:s.reps||'',weight:s.weight||'',warmup:!!s.warmup,done:false}))})); } }
  w.acts[day].push({id,type:'lift',done:false,data:{name,routineId:routineId||null,exercises}});
  save(); closeSheet(); openWorkout(day,id);
}

function woAct(){return WO?week().acts[WO.day].find(a=>a.id===WO.id):null;}
function woDateISO(){return iso(addDays(curMon,DAYS.indexOf(WO.day)));}
function openWorkout(day,id){
  const act=week().acts[day].find(a=>a.id===id); if(!act)return;
  if(!Array.isArray(act.data.exercises)){
    const legacy=act.data.exercise||'Lift'; let sets=[];
    if(Array.isArray(act.data.sets)) sets=act.data.sets.map(s=>({reps:s.reps||'',weight:s.weight||'',warmup:false,done:false}));
    else if(act.data.sets){const n=parseInt(act.data.sets)||0;sets=Array.from({length:n},()=>({reps:act.data.reps||'',weight:'',warmup:false,done:false}));}
    if(!sets.length) sets=[{reps:'',weight:'',warmup:false,done:false}];
    act.data={name:'Lift',routineId:null,exercises:[{exId:'cx_'+slug(legacy),name:legacy,note:'',sets}]}; save();
  }
  WO={day,id}; woEl.classList.add('show'); document.body.style.overflow='hidden';
  if(!act.done){ const now=Date.now(); if(!act.data.startedAt || now-act.data.startedAt>6*3600*1000){ act.data.startedAt=now; save(); } }
  renderWorkout(); startWoTimer();
}
let woTick=null;
function startWoTimer(){
  clearInterval(woTick); woTick=null;
  const upd=()=>{ const el=document.getElementById('woTimer'); const a=woAct(); if(!el||!a){clearInterval(woTick);woTick=null;return;}
    const sec=a.done?(a.data.duration||0):(a.data.startedAt?(Date.now()-a.data.startedAt)/1000:0); el.textContent=fmtDur(sec); };
  upd(); woTick=setInterval(upd,1000);
}
function stopWoTimer(){ clearInterval(woTick); woTick=null; }
/* ---- rest timer ---- */
let restInt=null, restEnd=0;
function startRest(){ const dur=DB.restDefault||120; restEnd=Date.now()+dur*1000; showRestBar(); }
function skipRest(){ restEnd=0; clearInterval(restInt); restInt=null; const b=document.getElementById('restbar'); if(b){ b.classList.remove('show'); b.classList.remove('done'); } }
function adjustRest(delta){ if(!restEnd) return; restEnd=Math.max(Date.now(), restEnd+delta*1000); DB.restDefault=Math.max(15,(DB.restDefault||120)+delta); save(); updateRestBar(); }
function showRestBar(){
  let b=document.getElementById('restbar');
  if(!b){ b=document.createElement('div'); b.id='restbar'; b.className='restbar';
    b.innerHTML=`<button class="rb-adj" data-rest="-15">−15</button><div class="rb-mid"><span class="rb-lbl">Rest</span><span class="rb-time" id="rbTime">0:00</span></div><button class="rb-adj" data-rest="15">+15</button><button class="rb-skip" data-rest="skip">Skip</button>`;
    (woEl||document.body).appendChild(b);
    b.addEventListener('click',e=>{ const r=e.target.closest('[data-rest]'); if(!r)return; const v=r.dataset.rest; if(v==='skip')skipRest(); else adjustRest(parseInt(v,10)); });
  }
  b.classList.remove('done'); b.classList.add('show'); updateRestBar();
  clearInterval(restInt); restInt=setInterval(updateRestBar,250);
}
function updateRestBar(){
  const el=document.getElementById('rbTime'); if(!el) return;
  const left=Math.max(0,Math.round((restEnd-Date.now())/1000));
  el.textContent=fmtDur(left);
  if(left<=0){ clearInterval(restInt); restInt=null; restEnd=0;
    const b=document.getElementById('restbar'); if(b) b.classList.add('done');
    try{ if(navigator.vibrate) navigator.vibrate(220); }catch(e){}
    setTimeout(()=>{ const bb=document.getElementById('restbar'); if(bb){ bb.classList.remove('show'); bb.classList.remove('done'); } },2600);
  }
}
function closeWorkout(){
  stopWoTimer(); skipRest();
  if(WO){const act=woAct(); if(act&&(!act.data.exercises||!act.data.exercises.length)){const w=week();w.acts[WO.day]=w.acts[WO.day].filter(a=>a.id!==WO.id);save();}}
  woEl.classList.remove('show'); document.body.style.overflow=''; WO=null; render();
}
function finishWorkout(){
  const act=woAct(); if(!act.data.exercises.length){flash('Add an exercise first');return;}
  let prs=0; act.data.exercises.forEach(ex=>{const best=bestE1RM(ex.exId,act.id);ex.sets.forEach(s=>{if(!s.warmup&&e1rm(s)>0&&e1rm(s)>best+0.01)prs++;});});
  const vol=workoutVolume(act);
  if(!act.done && act.data.startedAt) act.data.duration=Math.max(1,Math.round((Date.now()-act.data.startedAt)/1000));
  const dur=act.data.duration||0;
  act.done=true; commitHistory(act,woDateISO()); save(); closeWorkout(); celebrate(vol,prs,dur);
}

function exerciseCardHTML(ex,ei){

function togglePlan(day,v){
  let sel=planDraft[day]||[];
  if(v==='rest'){ sel = sel.includes('rest')?[]:['rest']; }
  else { sel=sel.filter(x=>x!=='rest'); sel = sel.includes(v)?sel.filter(x=>x!==v):sel.concat(v); }
  planDraft[day]=sel; renderPlanner();
}
function computeQuestDefaults(plan){
  const counts={cardio:0,lift:0,other:0}; let total=0;
  DAYS.forEach(d=>(plan[d]||[]).forEach(t=>{ if(t!=='rest'&&counts[t]!=null){counts[t]++;total++;} }));
  const lifts=Math.max(1,counts.lift||3);
  const sets=16;
  const miles=Math.max(4,(counts.cardio||2)*4);
  return [{tier:'basecamp',kind:'lifts',target:lifts},{tier:'ridgeline',kind:'reps',target:sets},{tier:'summit',kind:'miles',target:miles}];
}
function lockWeek(){
  const w=week(); w.plan={}; DAYS.forEach(d=>w.plan[d]=planDraft[d]||[]);
  questDraft.forEach((qd,i)=>{ const q=w.quests[i]; if(questKind(q)!==qd.kind||q.target!==qd.target) q.reward=null; q.tier=qd.tier; q.kind=qd.kind; delete q.type; q.target=Math.max(1,qd.target); });
  w.locked=true; save(); closeSheet2(); render(); flash('Week locked in');
}

/* ================= STREAK + SUMMIT LOG ================= */
function weekCamps(wk){
  if(!wk||!wk.quests) return 0; let n=0;
  wk.quests.forEach(q=>{ if(q.target>0 && questProgressIn(wk,q)>=q.target) n++; });
  return n;
}
function isRestWeek(wk){
  if(!wk||!wk.plan) return false;
  const planned=DAYS.filter(d=>(wk.plan[d]||[]).length);
  if(!planned.length) return false;
  return planned.every(d=>wk.plan[d].every(t=>t==='rest')) && !DAYS.some(d=>(wk.acts[d]||[]).some(a=>a.done));
}
function weekStreakState(key){
  const wk=DB.weeks[key];
  if(wk && weekCamps(wk)>=1) return 'hit';
  if(isRestWeek(wk)) return 'rest';
  return 'miss';
}
function computeStreak(){
  let streak=0, graced=null, m=mondayOf(new Date());
  if(weekStreakState(iso(m))!=='hit') m=addDays(m,-7);   // current week never breaks mid-week
  const graceUsed=DB.graceUsed||{};                       // {'YYYY-MM': weekKey}
  while(true){
    const key=iso(m), st=weekStreakState(key);
    if(st==='hit'){ streak++; }
    else if(st==='rest'){ /* pause: doesn't count, doesn't break */ }
    else {
      if(!DB.weeks[key]) break;                            // before app history: stop
      const mo=key.slice(0,7);
      if(graceUsed[mo]===key || (!graced && graceUsed[mo]==null && streak>0)){ // one grace/month
        if(graceUsed[mo]==null){ graceUsed[mo]=key; DB.graceUsed=graceUsed; graced=key; save(); }
      } else break;
    }
    m=addDays(m,-7);
  }
  return streak;
}
function currentStreak(){ try{ return computeStreak(); }catch(e){ let s=0,m=mondayOf(new Date()); if(weekCamps(DB.weeks[iso(m)])<1)m=addDays(m,-7); while(DB.weeks[iso(m)]&&weekCamps(DB.weeks[iso(m)])>=1){s++;m=addDays(m,-7);} return s; } }
function hasData(wk){ if(!wk)return false; const a=DAYS.some(d=>(wk.acts[d]||[]).length); const p=wk.plan&&DAYS.some(d=>(wk.plan[d]||[]).length); return a||p; }
function streakGlyph(){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c25b3c" stroke-width="2" stroke-linejoin="round"><path d="M3 20 L9 8 L13 14 L16 6 L21 20 Z"/></svg>`; }
function claimsHTML(){
  const cl=(DB.claims||[]).slice(-10).reverse(); if(!cl.length) return '';
  let h=`<div class="eyebrow" style="margin-top:22px">Rewards claimed</div>`;
  cl.forEach(c=>{ const t=tierOf(c.tier); h+=`<div class="claim-row"><span class="claim-star">★</span><span class="claim-name">${esc(c.name)}</span><span class="claim-meta">${t?t.name:c.tier} · ${c.date.slice(5)}</span></div>`; });
  return h;
}
function summitLogHTML(){
  const entries=Object.keys(DB.weeks||{}).map(k=>({k,mon:new Date(k+'T00:00:00'),wk:DB.weeks[k]}))
    .filter(e=>hasData(e.wk)).sort((a,b)=>b.mon-a.mon).slice(0,8);
  let h=`<div class="eyebrow">Summit log</div>`;
  if(!entries.length){ h+=`<div class="empty2" style="padding:6px 2px">Climb a week to start your log.</div>`; return h; }
  h+=`<div class="peaks">`;
  entries.forEach(e=>{
    const camps=weekCamps(e.wk), isCur=iso(e.mon)===iso(curMon);
    const graced=(DB.graceUsed||{})[e.k.slice(0,7)]===e.k && camps<1;
    const rest=isRestWeek(e.wk);
    const lbl=camps===3?'Summit':rest?'Rest':graced?'Grace':camps+'/3';
    h+=`<button class="peak ${isCur?'cur':''} ${graced?'graced':''}" data-loadweek="${e.k}">
      <span class="peak-range">${fmtRange(e.mon)}</span>
      <span class="peak-dots">${graced?'<i class="hollow"></i><i></i><i></i>':[0,1,2].map(i=>`<i class="${i<camps?'on':''}"></i>`).join('')}</span>
      <span class="peak-label">${lbl}</span>
    </button>`;
  });
  return h+`</div>`;
}

function openSettings(){
  sheet2Body.innerHTML=`<h3>Settings</h3>

      <button class="set-row2" id="rewardsBtn"><div><b>Edit rewards</b><span>Your three reward tiers</span></div>${IC.cr}</button>
      <button class="set-row2" id="exportBtn"><div><b>Export data</b><span>Download a backup (.json)</span></div>${IC.cr}</button>
      <button class="set-row2" id="importBtn"><div><b>Import data</b><span>Restore from a backup file</span></div>${IC.cr}</button>
      <div class="set-row2"><div><b>Units</b><span>Weight label</span></div><div class="unit-toggle"><button class="ut ${unit()==='lb'?'on':''}" data-unit="lb">lb</button><button class="ut ${unit()==='kg'?'on':''}" data-unit="kg">kg</button></div></div>
      <button class="set-row2" id="introBtn"><div><b>Replay intro</b><span>Show the welcome screen again</span></div>${IC.cr}</button>
      <button class="set-row2 danger-row" id="resetBtn"><div><b>Reset all data</b><span>Erase everything — double-tap</span></div></button>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
    <button class="btn primary" id="sheet2Cancel" style="margin-top:14px">Close</button>`;
  scrim2El.classList.add('show'); sheet2El.classList.add('show');
}
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='ridge-backup-'+iso(new Date())+'.json'; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000); DB.lastExport=Date.now(); save(); flash('Backup downloaded');
  }catch(e){ flash('Export failed'); }
}
function handleImport(file){
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result); if(data&&typeof data==='object'&&data.weeks){ DB=data; save(); curMon=mondayOf(new Date()); closeSheet2(); render(); flash('Data imported'); } else flash('Not a Ridge backup'); }catch(e){ flash('Could not read file'); } };
  r.readAsText(file);
}

const TIER_KEY={b:'basecamp',r:'ridgeline',s:'summit'};
const RS_CAP=6;
let rwDraft=null, rwBudget=null, rsOnboard=false, recog=null;
const rsetupEl=document.getElementById('rsetup'), rsetupBody=document.getElementById('rsetupBody');
function voiceSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function openRewards(onboard){
  rsOnboard=!!onboard;
  if(onboard){ rwDraft={basecamp:[],ridgeline:[],summit:[]}; }
  else { rwDraft={basecamp:((DB.rewards&&DB.rewards.basecamp)||[]).slice(),ridgeline:((DB.rewards&&DB.rewards.ridgeline)||[]).slice(),summit:((DB.rewards&&DB.rewards.summit)||[]).slice()}; }
  rwBudget=Object.assign({basecamp:'~$20',ridgeline:'~$50',summit:'~$100'}, DB.budgets||{});
  renderRewards(); rsetupEl.classList.add('show'); document.body.style.overflow='hidden';
}
function closeRewards(){ if(recog){try{recog.stop();}catch(e){}recog=null;} rsetupEl.classList.remove('show'); document.body.style.overflow=''; }
function captureBudgets(){ rsetupEl.querySelectorAll('[data-budget]').forEach(b=>{ rwBudget[b.dataset.budget]=b.value.trim()||rwBudget[b.dataset.budget]; }); }
function renderRewards(){
  const vOK=voiceSupported();
  let h=`<div class="rs-head"><h2>Your rewards</h2><p class="tagline">Keep each tier to a few things you'll be genuinely pumped to claim — up to ${RS_CAP} each, so every win lands.${vOK?' Tap the mic and just say them.':''}</p></div>`;
  [['basecamp','Basecamp'],['ridgeline','Ridgeline'],['summit','Summit']].forEach(([tk,nm])=>{
    const items=rwDraft[tk]||[], full=items.length>=RS_CAP;
    h+=`<div class="rs-tier">
      <div class="rs-tier-top"><span class="q-tier">${nm}</span><input class="rs-budget" data-budget="${tk}" value="${escAttr(rwBudget[tk]||'')}" placeholder="~$20" aria-label="${nm} budget"></div>
      <div class="rs-items">${items.length?items.map((it,idx)=>`<span class="rs-item">${esc(it)}<button class="rs-del" data-rdel="${tk}:${idx}" aria-label="Remove">${IC.x}</button></span>`).join(''):'<span class="rs-empty">Nothing yet — add a few good ones</span>'}</div>
      <div class="rs-add">
        <input class="rs-input" data-radd="${tk}" placeholder="${full?'Full — remove one to add':'Add a reward…'}" ${full?'disabled':''} aria-label="Add ${nm} reward">
        ${vOK?`<button class="rs-mic" data-mic="${tk}" ${full?'disabled':''} aria-label="Speak rewards">${IC.mic}</button>`:''}
        <button class="rs-addbtn" data-raddbtn="${tk}" ${full?'disabled':''}>Add</button>
      </div>
      <div class="rs-foot"><button class="rs-clear" data-rclear="${tk}" ${items.length?'':'style="visibility:hidden"'}>Clear all</button><span class="rs-count">${items.length}/${RS_CAP}</span></div>
    </div>`;
  });
  h+=`<div class="sheet-actions"><button class="btn ghost" id="rsBack">${rsOnboard?'Skip':'Cancel'}</button><button class="btn primary" id="rsSave">${rsOnboard?'Save & continue →':'Save'}</button></div>`;
  rsetupBody.innerHTML=h;
}
function addOne(tk,v){ v=(v||'').trim(); if(!v)return false; if(rwDraft[tk].length>=RS_CAP)return false; if(rwDraft[tk].some(x=>x.toLowerCase()===v.toLowerCase()))return false; rwDraft[tk].push(v); return true; }
function addReward(tk){ const inp=rsetupEl.querySelector('[data-radd="'+tk+'"]'); const v=inp?inp.value:''; if(!v.trim())return; if(rwDraft[tk].length>=RS_CAP){flash('Up to '+RS_CAP+' per tier — remove one first');return;} addOne(tk,v); captureBudgets(); renderRewards(); }
function addRewardsFromText(tk,text){
  const parts=text.split(/,|;|\n|·|\bthen\b|\band\b/i).map(s=>s.replace(/^(a|an|some|the)\s+/i,'').trim()).filter(Boolean);
  let added=0; parts.forEach(p=>{ p=p.charAt(0).toUpperCase()+p.slice(1); if(addOne(tk,p)) added++; });
  captureBudgets(); renderRewards(); if(added) flash(added+' added to '+tk); else flash('Nothing new caught — try again');
}
function toggleVoice(tk,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ flash('Voice not supported here'); return; }
  if(recog){ try{recog.stop();}catch(e){} return; }
  const inp=rsetupEl.querySelector('[data-radd="'+tk+'"]'); let finalText='';
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=true;
  btn.classList.add('listening');
  recog.onresult=(e)=>{ let interim=''; for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) finalText+=r[0].transcript+', '; else interim+=r[0].transcript; } if(inp) inp.value=(finalText+interim).trim(); };
  recog.onerror=(e)=>{ btn.classList.remove('listening'); recog=null; if(e&&e.error==='not-allowed') flash('Mic permission blocked'); };
  recog.onend=()=>{ btn.classList.remove('listening'); recog=null; const txt=inp?inp.value.trim():''; if(txt){ if(inp) inp.value=''; addRewardsFromText(tk,txt); } };
  try{ recog.start(); flash('Listening… tap mic to stop'); }catch(err){ btn.classList.remove('listening'); recog=null; }
}
rsetupEl.addEventListener('click',e=>{
  const rc=e.target.closest('[data-rclear]'); if(rc){ rwDraft[rc.dataset.rclear]=[]; captureBudgets(); renderRewards(); return; }
  const rd=e.target.closest('[data-rdel]'); if(rd){ const [tk,idx]=rd.dataset.rdel.split(':'); rwDraft[tk].splice(+idx,1); captureBudgets(); renderRewards(); return; }
  const mc=e.target.closest('[data-mic]'); if(mc){ toggleVoice(mc.dataset.mic, mc); return; }
  const ab=e.target.closest('[data-raddbtn]'); if(ab){ addReward(ab.dataset.raddbtn); return; }
  if(e.target.id==='rsSave'){ captureBudgets();
    ['basecamp','ridgeline','summit'].forEach(tk=>rwDraft[tk]=(rwDraft[tk]||[]).filter(Boolean));
    DB.rewards={basecamp:rwDraft.basecamp,ridgeline:rwDraft.ridgeline,summit:rwDraft.summit}; DB.budgets=rwBudget; DB.rewardsSet=true; save();
    closeRewards(); if(rsOnboard){ openPlanner(); } else { render(); flash('Rewards saved'); } return; }
  if(e.target.id==='rsBack'){ closeRewards(); if(rsOnboard) openPlanner(); return; }
});
rsetupEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.target.classList&&e.target.classList.contains('rs-input')){ e.preventDefault(); addReward(e.target.dataset.radd); } });
